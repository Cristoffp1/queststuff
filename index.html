<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quest Stuff - Fitness RPG</title>
    <style>
        /* Estilos básicos para garantir o funcionamento visual correto */
        :root {
            --bg-dark: #0d0e15;
            --card-bg: #151724;
            --muted: #8b8eaf;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        #app {
            display: none; /* O JS muda para 'flex' após o Splash Screen */
            flex-direction: column;
            min-height: 100vh;
        }
        #splash {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.6s ease;
        }
        #splash.hidden {
            opacity: 0;
            pointer-events: none;
        }
        #user-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: var(--card-bg);
            font-size: 14px;
        }
        #offline-bar {
            background: #f44336;
            color: white;
            text-align: center;
            padding: 4px;
            font-size: 12px;
            display: none;
        }
        #offline-bar.show {
            display: block;
        }
        .nav-bar {
            display: flex;
            justify-content: space-around;
            background: var(--card-bg);
            padding: 12px 0;
            position: fixed;
            bottom: 0; width: 100%;
        }
        .nav-btn {
            background: none; border: none; color: var(--muted); cursor: pointer; font-size: 12px;
        }
        .nav-btn.active {
            color: #4CAF50;
            font-weight: bold;
        }
        #content {
            padding: 20px 20px 80px;
            flex: 1;
        }
        /* Telas sobrepostas (Overlay) */
        .overlay-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark);
            z-index: 1000;
            display: none;
            overflow-y: auto;
        }
        .overlay-screen.open, .overlay-screen.show {
            display: block;
        }
    </style>
</head>
<body>

    <div id="offline-bar">Você está desconectado da internet. Algumas funções podem não sincronizar.</div>

    <div id="splash">
        <div style="text-align: center;">
            <h1 style="font-size: 32px; margin-bottom: 10px;">⚔️ Quest Stuff</h1>
            <p style="color: var(--muted); font-size: 16px;">Carregando o seu RPG de Fitness...</p>
        </div>
    </div>

    <div id="app">
        
        <div id="user-bar" style="display: none;">
            <span>Logado como: <strong id="user-display-name">...</strong></span>
        </div>

        <div id="auth-container" style="max-width: 320px; margin: 40px auto 20px; display: flex; flex-direction: column; gap: 12px; padding: 0 20px;">
            <h2 style="text-align: center; margin-bottom: 10px;">Entrar no Jogo</h2>
            <input type="email" id="auth-email" placeholder="Seu e-mail" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #1E2040; background: #1E2040; color: #fff; font-size: 15px; box-sizing: border-box;">
            <input type="password" id="auth-password" placeholder="Sua senha" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #1E2040; background: #1E2040; color: #fff; font-size: 15px; box-sizing: border-box;">
            
            <button id="btn-login" style="width: 100%; padding: 14px; border-radius: 8px; background: #4CAF50; color: white; border: none; cursor: pointer; font-weight: bold; font-size: 15px;" onclick="handleSignIn()">Entrar</button>
            <button id="btn-register" style="width: 100%; padding: 14px; border-radius: 8px; background: #2196F3; color: white; border: none; cursor: pointer; font-weight: bold; font-size: 15px;" onclick="handleSignUp()">Registrar</button>
            
            <button id="btn-logout" style="width: 100%; padding: 14px; border-radius: 8px; background: #f44336; color: white; border: none; cursor: pointer; font-weight: bold; font-size: 15px; display: none;" onclick="handleSignOut()">Sair da Conta</button>
        </div>

        <div id="content"></div>

        <nav class="nav-bar">
            <button class="nav-btn active" data-tab="home" onclick="switchTab('home')">🏠<br>Início</button>
            <button class="nav-btn" data-tab="missions" onclick="switchTab('missions')">⚔️<br>Missões</button>
            <button class="nav-btn" data-tab="achievements" onclick="switchTab('achievements')">🏆<br>Conquistas</button>
            <button class="nav-btn" data-tab="ranking" onclick="switchTab('ranking')">📊<br>Ranking</button>
            <button class="nav-btn" data-tab="profile" onclick="switchTab('profile')">👤<br>Perfil</button>
        </nav>

    </div>

    <div id="mission-screen" class="overlay-screen"></div>

    <div id="rest-screen" class="overlay-screen" style="display:none; align-items:center; justify-content:center; flex-direction:column; background:rgba(13,14,21,0.95);">
        <div style="text-align:center; padding:20px;">
            <h2>Tempo de Descanso</h2>
            <svg viewBox="0 0 120 120" width="120" height="120" style="margin:20px auto;">
                <circle cx="60" cy="60" r="52" fill="none" stroke="#1E2040" stroke-width="8"/>
                <circle id="rest-progress" cx="60" cy="60" r="52" fill="none" stroke="#4CAF50" stroke-width="8" stroke-dasharray="326.7" stroke-dashoffset="0" transform="rotate(-90 60 60)"/>
            </svg>
            <div id="rest-count" style="font-size:32px; font-weight:bold; margin-top:-95px; margin-bottom:60px;">30</div>
            <button style="padding:12px 24px; border-radius:8px; background:#2196F3; color:white; border:none; cursor:pointer;" onclick="skipRest()">Pular Descanso</button>
        </div>
    </div>

    <div id="levelup-overlay" class="overlay-screen" style="display:none; align-items:center; justify-content:center; flex-direction:column; background:rgba(0,0,0,0.85); z-index:9999;">
        <div style="text-align:center; padding:30px;">
            <h1 style="color:#FFD700; font-size:40px; margin-bottom:5px;">🎉 LEVEL UP! 🎉</h1>
            <p style="font-size:18px;">Você subiu de nível!</p>
            <div style="font-size:72px; margin:20px 0;" id="levelup-num">2</div>
            <button style="padding:14px 28px; border-radius:8px; background:#4CAF50; color:white; border:none; cursor:pointer; font-weight:bold;" onclick="closeLevelUp()">Continuar Jornada</button>
        </div>
    </div>

    <div id="toast" style="position: fixed; bottom: 85px; left: 50%; transform: translateX(-50%); z-index: 10000; width: calc(100% - 40px); max-width: 340px;"></div>

    <div id="particles" style="position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:9998; overflow:hidden;"></div>

    <div id="ach-flash" class="overlay-screen" style="display:none; height:auto; bottom:90px; top:auto; left:20px; width:calc(100% - 40px); max-width:340px; background:#FFD700; color:#000; padding:12px; border-radius:8px; box-shadow:0 4px 15px rgba(0,0,0,0.3);">
        <div style="display:flex; align-items:center; gap:12px;">
            <span id="ach-flash-icon" style="font-size:24px;">🏆</span>
            <div>
                <div style="font-size:11px; text-transform:uppercase; font-weight:bold; opacity:0.7;">Conquista Desbloqueada!</div>
                <div id="ach-flash-title" style="font-weight:bold; font-size:15px;">Nome da Conquista</div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./app.js"></script>

</body>
</html>
